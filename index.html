    <style>
        *, html {
            padding: 0;
            margin: 0;
        }
        #page {
            height: 100%;
            width: 100%;
        }
        #notes {
            padding: 10px;
            width: 100%;
            font-family: monospace;
            font-size: 13.5px;
            background-color: #FFFBD5;
            outline: none;
            box-sizing: border-box;
        }

        #settingsButton {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            padding: 4px 6px;
            opacity: 0.5;
            transition: opacity 0.15s;
        }
        #settingsButton:hover { opacity: 1; }

        /* Settings dialog */
        #settings {
            border: none;
            border-radius: 16px;
            padding: 0;
            margin: auto;
            box-shadow: 0 24px 80px rgba(0,0,0,0.35);
            max-width: 440px;
            max-height: 90vh;
            width: 90%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }
        #settings[open] {
            display: flex;
            flex-direction: column;
        }
        #settings::backdrop {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(3px);
        }
        .s-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px 14px;
            border-bottom: 1px solid #e8e8e8;
        }
        .s-header h2 { margin: 0; font-size: 16px; font-weight: 600; color: #111; }
        .s-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #999;
            padding: 4px 8px;
            border-radius: 6px;
            line-height: 1;
        }
        .s-close:hover { background: #f0f0f0; color: #333; }
        .s-body {
            padding: 18px 22px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        #settingsForm {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .s-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #999;
            margin-bottom: 10px;
        }
        .themes-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .theme-card {
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.15s, transform 0.1s;
        }
        .theme-card:hover { border-color: #bbb; transform: scale(1.04); }
        .theme-card.active { border-color: #0066ff; }
        .theme-preview {
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-size: 12px;
        }
        .theme-name {
            font-size: 10px;
            text-align: center;
            padding: 3px 2px;
            background: #f7f7f7;
            color: #555;
            font-weight: 500;
        }
        .color-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .color-row + .color-row { border-top: 1px solid #f2f2f2; }
        .color-row label { font-size: 14px; color: #333; }
        #settings input[type="color"] {
            width: 36px;
            height: 30px;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
            background: none;
        }
        .fs-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .fs-header output { color: #0066ff; font-weight: 600; }
        #settings input[type="range"] { width: 100%; accent-color: #0066ff; }
        .s-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 14px 22px 18px;
            border-top: 1px solid #e8e8e8;
        }
        .s-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
        }
        .s-btn:hover { background: #f5f5f5; }
        .s-btn-primary { background: #0066ff; color: #fff; border-color: #0066ff; }
        .s-btn-primary:hover { background: #0052cc; }
    </style>
	</head>
    <body>
        <div id="page">
            <textarea id="notes" rows="30" autofocus></textarea>
		    <button id="settingsButton">⚙️</button>

	        <!-- Settings dialog -->
	        <dialog id="settings">
	            <form id="settingsForm" method="dialog">
	                <div class="s-header">
	                    <h2>Nastavení</h2>
	                    <button class="s-close" value="cancel">✕</button>
	                </div>
	                <div class="s-body">
	                    <div>
	                        <div class="s-label">Motiv</div>
	                        <div class="themes-grid" id="themesGrid"></div>
	                    </div>
	                    <div>
	                        <div class="s-label">Vlastní barvy</div>
	                        <div class="color-row">
	                            <label for="bgColor">Pozadí</label>
	                            <input type="color" id="bgColor" name="bgColor">
	                        </div>
	                        <div class="color-row">
	                            <label for="txtColor">Text</label>
	                            <input type="color" id="txtColor" name="txtColor">
	                        </div>
	                    </div>
	                    <div>
	                        <div class="s-label">Velikost písma</div>
	                        <div class="fs-header">
	                            <span>Velikost</span>
	                            <output id="fontSizeOutput">13.5</output>
	                        </div>
	                        <input type="range" id="fontSize" name="fontSize" min="10" max="24" step="0.5">
	                    </div>
	                </div>
	                <div class="s-footer">
	                    <button class="s-btn" value="cancel">Zrušit</button>
	                    <button class="s-btn s-btn-primary" id="confirmBtn" value="default">Uložit</button>
	                </div>
	            </form>
            </dialog>

            <form style="display:none">
                <input type="file" id="opeNotesToLoad" onchange="loadNotes()">
            </form>
        </div>

        <script>
            /* Stretch out textarea height */
            var documentHeight = Math.max(document.documentElement.clientHeight, window.innerHeight || 0) - 5;
            document.getElementById('notes').style.height = documentHeight + 'px';

            /* Key shortcuts */
            document.addEventListener("keydown", function(event) {
                // CTRL+S
                if (event.which == 83 && event.ctrlKey) {
                     event.preventDefault();
                    console.log('CTRL+S');
                }

                // ALT+X
                if (event.which == 88 && event.altKey) {
                    event.preventDefault();

                    let notes = document.getElementById('notes');
                    let startPos = notes.selectionStart;
                    let endPos = notes.selectionEnd;
                    const atLineStart = startPos === 0 || notes.value[startPos - 1] === '\n';
                    const horizontalRule = (atLineStart ? '' : '\n') + "".padStart(164, "-") + "\n";
                    notes.value = notes.value.substring(0, startPos)
                        + horizontalRule
                        + notes.value.substring(endPos);
                    notes.selectionStart = notes.selectionEnd = startPos + horizontalRule.length;
                }

                // CTRL+Q, ALT+Q
                if (event.which == 81 && event.ctrlKey
                    || event.which == 81 && event.altKey) {
                    event.preventDefault();

                    let notes = document.getElementById('notes');
                    let currentStartPos = notes.selectionStart;
                    let endPos = notes.value.indexOf("\n", currentStartPos);
                    let startPos = notes.value.substring(0, currentStartPos).lastIndexOf("\n");

                    if (endPos === -1) {
                        // Poslední řádek - smaž od předchozího \n do konce
                        notes.value = startPos === -1 ? '' : notes.value.substring(0, startPos);
                        notes.selectionEnd = Math.max(0, startPos);
                    } else if (endPos > startPos) {
                        notes.value = notes.value.substring(0, startPos)
                            + notes.value.substring(endPos, notes.value.length);
                        notes.selectionEnd = startPos + 1;
                    }
                }

                // CTRL+SHIFT+S
                if (event.which == 83 && event.ctrlKey && event.shiftKey) {
                    event.preventDefault();
                    console.log('CTRL+SHIFT+S');
                    download('notes.txt', document.getElementById('notes').value);
                }

                // CTRL+SHIFT+O
                if (event.which == 79 && event.ctrlKey && event.shiftKey) {
                    event.preventDefault();
                    console.log('CTRL+SHIFT+O');
                    document.getElementById('opeNotesToLoad').click();
                }

                // CTRL+D — duplikovat řádek
                if (event.which == 68 && event.ctrlKey && !event.shiftKey) {
                    event.preventDefault();
                    const notes = document.getElementById('notes');
                    const val = notes.value;
                    const pos = notes.selectionStart;
                    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                    const lineEnd = val.indexOf('\n', pos);
                    const line = lineEnd === -1 ? val.substring(lineStart) : val.substring(lineStart, lineEnd);
                    const insert = '\n' + line;
                    const insertAt = lineEnd === -1 ? val.length : lineEnd;
                    notes.value = val.substring(0, insertAt) + insert + val.substring(insertAt);
                    notes.selectionStart = notes.selectionEnd = pos + insert.length;
                }

                // ALT+UP / ALT+DOWN — přesunout řádek
                if ((event.which == 38 || event.which == 40) && event.altKey) {
                    event.preventDefault();
                    const notes = document.getElementById('notes');
                    const val = notes.value;
                    const pos = notes.selectionStart;
                    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                    const lineEnd = val.indexOf('\n', pos);
                    const currentLine = lineEnd === -1 ? val.substring(lineStart) : val.substring(lineStart, lineEnd);

                    if (event.which == 38) { // nahoru
                        if (lineStart === 0) return;
                        const prevLineStart = val.lastIndexOf('\n', lineStart - 2) + 1;
                        const prevLine = val.substring(prevLineStart, lineStart - 1);
                        const after = lineEnd === -1 ? '' : val.substring(lineEnd);
                        notes.value = val.substring(0, prevLineStart) + currentLine + '\n' + prevLine + after;
                        notes.selectionStart = notes.selectionEnd = prevLineStart + (pos - lineStart);
                    } else { // dolů
                        if (lineEnd === -1) return;
                        const nextLineEnd = val.indexOf('\n', lineEnd + 1);
                        const nextLine = nextLineEnd === -1 ? val.substring(lineEnd + 1) : val.substring(lineEnd + 1, nextLineEnd);
                        const after = nextLineEnd === -1 ? '' : val.substring(nextLineEnd);
                        notes.value = val.substring(0, lineStart) + nextLine + '\n' + currentLine + after;
                        notes.selectionStart = notes.selectionEnd = lineStart + nextLine.length + 1 + (pos - lineStart);
                    }
                }

                // CTRL+L — vybrat aktuální řádek
                if (event.which == 76 && event.ctrlKey) {
                    event.preventDefault();
                    const notes = document.getElementById('notes');
                    const val = notes.value;
                    const pos = notes.selectionStart;
                    const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
                    const lineEnd = val.indexOf('\n', pos);
                    notes.selectionStart = lineStart;
                    notes.selectionEnd = lineEnd === -1 ? val.length : lineEnd;
                }

            });

            function loadNotes() {
                let file = document.querySelector('input[type=file]').files[0];
                let reader = new FileReader();

                if (file.type.match(/text.*/)) {
                    reader.onload = function (event) {
                        document.getElementById('notes').value = event.target.result;
                    }
                } else {
                    alert("It doesn't seem to be a text file!");
                }
                reader.readAsText(file);
            }

            window.onload = function() {
                var textarea = document.getElementById('notes');

                /* Restore data from localStorage */
                textarea.value = load();

                /* Save data to localStorage */
                var func = function() {
                    save(textarea.value)
                }
                textarea.onkeyup = func;
                textarea.onblur = func;

                applySettings();
            }

            var save = function(what='', where='notes') {
                localStorage.setItem(where, what);
            };

            var load = function(key='notes') {
                return localStorage.getItem(key);
            };

            var applySettings = function() {
                var themes = {
                    default: {
                        "backgroundColor": "#FFFBD5",
                        "color": "#222222",
                        "fontFamily": "monospace",
                        "fontSize": "13.5px"
                    },
                    dark: {
                        "backgroundColor": "#000",
                        "color": "#3fff00",
                        "fontFamily": "monospace",
                        "fontSize": "13.5px"
                    }
                };
                var textarea = document.getElementById('notes');
                var settings = localStorage.getItem('settings');

                if (settings) {
                    settings = JSON.parse(settings);
                } else {
                    localStorage.setItem('settings', JSON.stringify(themes.default))
                    settings = themes.default;
                }

                for (var key in settings) {
                    textarea.style[key] = settings[key];
                }
            }


            /* Settings */
            const settingsButton = document.getElementById('settingsButton');
            const settingsDialog = document.getElementById('settings');

            const bgcolor = settingsDialog.querySelector('#bgColor');
            const txtcolor = settingsDialog.querySelector('#txtColor');
            const fontSize = settingsDialog.querySelector('#fontSize');
            const fontSizeOutput = document.getElementById('fontSizeOutput');
            const textarea = document.getElementById('notes');

            const toHex = (colorStr) => {
                if (!colorStr) return '#000000';
                if (colorStr.startsWith('#')) return colorStr;
                const m = colorStr.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
                return m ? '#' + m.slice(1).map(n => parseInt(n).toString(16).padStart(2, '0')).join('') : '#000000';
            };

            const themes = [
                { name: 'Krém',      bg: '#FFFBD5', color: '#222222' },
                { name: 'Bordo',     bg: '#fcffe0', color: '#3f0e0e' },
                { name: 'Tmavý',     bg: '#1c1c1e', color: '#e5e5e7' },
                { name: 'Matrix',    bg: '#0d0208', color: '#00ff41' },
                { name: 'Army',      bg: '#fff9eb', color: '#1e3d05' },
                { name: 'Solarized', bg: '#d2d2d2', color: '#839496' },
                { name: 'Nord',      bg: '#2e3440', color: '#d8dee9' },
                { name: 'Dracula',   bg: '#282a36', color: '#f8f8f2' },
            ];

            function renderThemes() {
                const grid = document.getElementById('themesGrid');
                grid.innerHTML = '';
                themes.forEach((theme) => {
                    const card = document.createElement('div');
                    card.className = 'theme-card';
                    card.innerHTML = `<div class="theme-preview" style="background:${theme.bg};color:${theme.color}">Aa 123</div><div class="theme-name">${theme.name}</div>`;
                    card.addEventListener('click', () => {
                        bgcolor.value = theme.bg;
                        txtcolor.value = theme.color;
                        applyLivePreview();
                        updateActiveTheme();
                    });
                    grid.appendChild(card);
                });
                updateActiveTheme();
            }

            function updateActiveTheme() {
                document.querySelectorAll('.theme-card').forEach((card, i) => {
                    const t = themes[i];
                    card.classList.toggle('active',
                        t.bg.toLowerCase() === bgcolor.value.toLowerCase() &&
                        t.color.toLowerCase() === txtcolor.value.toLowerCase()
                    );
                });
            }

            function applyLivePreview() {
                textarea.style.backgroundColor = bgcolor.value;
                textarea.style.color = txtcolor.value;
                textarea.style.fontSize = fontSize.value + 'px';
            }

            bgcolor.addEventListener('input', () => { applyLivePreview(); updateActiveTheme(); });
            txtcolor.addEventListener('input', () => { applyLivePreview(); updateActiveTheme(); });
            fontSize.addEventListener('input', () => { fontSizeOutput.value = fontSize.value; applyLivePreview(); });

            let savedSettings = null;

            settingsButton.addEventListener('click', function() {
                savedSettings = {
                    backgroundColor: textarea.style.backgroundColor,
                    color: textarea.style.color,
                    fontSize: textarea.style.fontSize
                };
                bgcolor.value = toHex(textarea.style.backgroundColor);
                txtcolor.value = toHex(textarea.style.color);
                fontSize.value = parseFloat(textarea.style.fontSize) || 13.5;
                fontSizeOutput.value = fontSize.value;
                renderThemes();
                settingsDialog.showModal();
            });

            settingsDialog.addEventListener('close', function() {
                if (settingsDialog.returnValue === 'cancel' || settingsDialog.returnValue === '') {
                    if (savedSettings) {
                        textarea.style.backgroundColor = savedSettings.backgroundColor;
                        textarea.style.color = savedSettings.color;
                        textarea.style.fontSize = savedSettings.fontSize;
                    }
                } else {
                    const settings = {
                        backgroundColor: bgcolor.value,
                        color: txtcolor.value,
                        fontFamily: 'monospace',
                        fontSize: fontSize.value + 'px'
                    };
                    localStorage.setItem('settings', JSON.stringify(settings));
                    for (const key in settings) textarea.style[key] = settings[key];
                }
            });

            /* Download notes as TXT */
            function download(filename, text) {
                var element = document.createElement('a');
                element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
                element.setAttribute('download', filename);

                element.style.display = 'none';
                document.body.appendChild(element);

                element.click();

                document.body.removeChild(element);
            }
      </script>
  </body>
</html>
